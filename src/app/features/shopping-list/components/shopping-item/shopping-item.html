<div class="item-card">

  <div class="item-card__main">

    <div class="item-card__title">
      {{ item.title }}
    </div>

    <div class="item-card__meta">

      <div class="meta-row">
        Qty: {{ item.quantity }}
      </div>

      <div class="meta-row">
        Status:
        <span
          class="status-badge"
          [class.done]="item.isCompleted"
          [class.active]="!item.isCompleted">
          {{ item.isCompleted ? 'Done' : 'Active' }}
        </span>
      </div>

      <div class="meta-row" *ngIf="item.category">
        Category:
        <span class="meta-value">{{ item.category }}</span>
      </div>

      <div class="meta-row" *ngIf="item.description">
        Description:
        <span class="meta-value">{{ item.description }}</span>
      </div>

    </div>

    <div class="item-card__date">
      Created: {{ item.createdAt | date:'short' }}
    </div>

  </div>

  <div class="item-card__actions">

    <button class="btn-edit" (click)="onEdit()">Edit</button>
    <button class="btn-delete" (click)="onDelete()">Delete</button>

  </div>

</div>
