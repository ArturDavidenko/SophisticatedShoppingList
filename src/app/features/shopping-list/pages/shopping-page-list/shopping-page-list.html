<div class="shopping-page">

  <div class="shopping-page__header">

    <h2>My List</h2>

    <button (click)="onAddItem()">
      + Add item
    </button>

  </div>

  <div class="shopping-page__list">

    <app-shopping-item
      *ngFor="let item of items$ | async"
      [item]="item"
      (delete)="onDeleteItem($event)">
    </app-shopping-item>

  </div>

</div>
