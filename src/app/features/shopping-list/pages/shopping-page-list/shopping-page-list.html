<div class="shopping-page">

  <div class="shopping-page__header">

    <h2>My List</h2>

    <button (click)="onOpenAdd()">
      + Add item
    </button>

  </div>

  <div class="shopping-page__list">

    <app-shopping-item
      *ngFor="let item of items$ | async"
      [item]="item"
      (delete)="onDeleteItem($event)"
      (edit)="onEditItem($event)">
    </app-shopping-item>

  </div>

</div>

<app-edit-modal-item
  [item]="selectedItem"
  [isOpen]="isEditOpen"
  (save)="onSave($event)"
  (close)="isEditOpen=false">
</app-edit-modal-item>

<app-add-modal-item
    [isOpen]="isAddOpen"
    (create)="onCreate($event)"
    (close)="isAddOpen = false">
</app-add-modal-item>
